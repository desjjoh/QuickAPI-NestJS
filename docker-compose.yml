services:
  mysql:
    image: mysql:8.4
    container_name: quickapi-mysql
    restart: unless-stopped

    ports:
      - '3307:3306'

    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: quickapi
      MYSQL_USER: quickapi_app
      MYSQL_PASSWORD: quickapi_password

    volumes:
      - quickapi_mysql_data:/var/lib/mysql

    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  quickapi_mysql_data:
