services:
  mysql:
    image: mysql:8.4
    container_name: quickapi-mysql
    restart: unless-stopped

    cpus: '1.0'
    mem_limit: 2g

    ports:
      - '3307:3306'

    command:
      - '--innodb-buffer-pool-size=512M'
      - '--max-connections=25'

    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: quickapi
      MYSQL_USER: quickapi_app
      MYSQL_PASSWORD: quickapi_password

    volumes:
      - quickapi_mysql_data:/var/lib/mysql

    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile

    cpus: '0.5'
    mem_limit: 512m

    container_name: quickapi-api
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - '4000:4000'

    env_file:
      - .env

    environment:
      NODE_ENV: production

      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: quickapi_app
      DB_PASSWORD: quickapi_password
      DB_DATABASE: quickapi

      PUBLIC_API_URL: https://localhost:4000

      HTTPS_ENABLED: 'true'
      HTTPS_KEY_PATH: certs/localhost-key.pem
      HTTPS_CERT_PATH: certs/localhost.pem

      COOKIE_SECURE: 'true'

      NODE_OPTIONS: '--max-old-space-size=384'

    volumes:
      - ./certs:/app/certs:ro
      - ./public:/app/public
      - ./tmp:/app/tmp

volumes:
  quickapi_mysql_data:
